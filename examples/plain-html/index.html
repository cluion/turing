<!doctype html>
<meta charset="utf-8" />
<title>Turing plain-HTML example</title>
<!-- For local dev, swap the CDN src for ../../js/packages/core/dist/turing.global.js -->
<!-- Pin the version and add integrity="sha384-..." crossorigin in production. -->
<script src="https://cdn.jsdelivr.net/npm/@cluion/turing-core@0.1.0/dist/turing.global.js" defer></script>

<form method="post" action="/submit">
  <label>Name <input name="name" /></label>
  <div data-turing data-turing-url="/turing/challenge" data-turing-type="pow"></div>
  <button type="submit">Submit</button>
</form>
