name: ci
on: [push, pull_request]

jobs:
  php:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # testbench and phpunit are pinned per Laravel version: testbench 8/9/10/11
        # track Laravel 10/11/12/13, and each supports a different phpunit range.
        include:
          - laravel: '^10.0'
            testbench: '^8.0'
            phpunit: '^10.5'
          - laravel: '^11.0'
            testbench: '^9.0'
            phpunit: '^11.0'
          - laravel: '^12.0'
            testbench: '^10.0'
            phpunit: '^11.0'
          - laravel: '^13.0'
            testbench: '^11.0'
            phpunit: '^11.0'
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.3', extensions: mbstring, coverage: none }
      # Laravel 10/11 are past security support, so even their latest releases
      # carry advisories composer blocks by default. This matrix tests
      # compatibility only (nothing here is deployed), so lift the block.
      - run: composer config policy.advisories.block false
      - run: composer require --dev --no-update "orchestra/testbench:${{ matrix.testbench }}" "phpunit/phpunit:${{ matrix.phpunit }}"
      - run: composer require --no-update "illuminate/support:${{ matrix.laravel }}"
      - run: composer update --prefer-dist --no-interaction --with-all-dependencies
      - run: vendor/bin/phpunit

  js:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: js } }
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v7
        with: { node-version: 24 }
      - run: pnpm install --frozen-lockfile
      # Build first: the element/vue/react packages resolve @cluion/turing-core
      # through its dist exports, which a fresh checkout does not have yet.
      - run: pnpm -r build
      - run: pnpm -r test
      - run: pnpm -r typecheck

  e2e:
    needs: [php, js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.3', extensions: mbstring, coverage: none }
      - run: composer update --prefer-dist --no-interaction
      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v7
        with: { node-version: 24 }
      # Build the browser widget; the testbench route serves it from dist.
      - run: pnpm install --frozen-lockfile && pnpm --filter @cluion/turing-core build
        working-directory: js
      - run: pnpm install --frozen-lockfile && pnpm exec playwright install --with-deps chromium && pnpm exec playwright test
        working-directory: e2e
