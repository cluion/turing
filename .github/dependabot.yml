version: 2
updates:
  # JS packages, docs, and e2e (pnpm). Grouped so weekly updates arrive as one
  # PR per ecosystem instead of a swarm — these are all dev/build tooling.
  - package-ecosystem: npm
    directories:
      - "/js"
      - "/js/packages/*"
      - "/docs"
      - "/e2e"
    schedule:
      interval: weekly
    groups:
      js-toolchain:
        patterns:
          - "*"
    ignore:
      # TypeScript 7 is the native-compiler rewrite; tsup's dts bundler isn't
      # ready for it yet. Adopt it as a deliberate migration, not a weekly PR.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Keep @types/node on the Node LTS we run in CI (24); a major bump ahead
      # of the runtime just adds noise.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # PHP (composer): the one runtime dep plus dev tooling.
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    groups:
      php:
        patterns:
          - "*"

  # Keep the CI/release/pages actions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
